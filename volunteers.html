<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Volunteers - HerShield AI+</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip" href="#mainContent">Skip to content</a>
  <header id="siteHeader" role="banner" class="card header-hero"></header>

  <main id="mainContent" class="container">
    <header class="page-header card" style="padding:12px;">
      <h1>Nearby Volunteers</h1>
      <a class="back" href="home.html">← Home</a>
    </header>

    <section class="card" style="margin-top:12px;">
      <label for="searchVolunteers">Search volunteers</label>
      <input id="searchVolunteers" placeholder="Search by name or area" />
      <label class="inline"><input id="womenOnlyVol" type="checkbox" /> Show only highly recommended by women</label>

      <ul id="volunteer-list" class="list" aria-live="polite" style="margin-top:12px;"></ul>
    </section>

    <section class="card" style="margin-top:12px;">
      <h2>Leave Feedback for a Volunteer</h2>
      <form id="volunteerFeedbackForm" class="form">
        <label>Name of Volunteer
          <input id="volunteerName" required />
        </label>
        <label>Your gender
          <select id="volunteerUserGender" required>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="other">Other</option>
          </select>
        </label>
        <label>Rating (1-5)
          <input id="volunteerRating" type="number" min="1" max="5" required />
        </label>
        <label>Feedback
          <textarea id="volunteerFeedback" required></textarea>
        </label>
        <div class="form-row">
          <button type="submit" class="primary">Submit Feedback</button>
          <button type="button" id="volClear" class="small">Clear</button>
        </div>
      </form>
      <p id="volunteerFeedbackResult" aria-live="polite"></p>
    </section>
  </main>

  <div class="particles" aria-hidden="true"></div>
  <script src="main.js"></script>
</body>
</html>
